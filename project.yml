name: Mattery
options:
  bundleIdPrefix: com.puffer
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
targets:
  Mattery:
    type: application
    platform: macOS
    sources:
      - path: Mattery
        excludes:
          - "Info.plist"
    info:
      path: Mattery/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Mattery
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 Puffer Inc."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.puffer.Mattery
        PRODUCT_NAME: Mattery
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Mattery/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
